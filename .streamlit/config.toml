# Tema de la app de inferencia (Semana 4) — claro, formal y sobrio.
# Theming nativo de Streamlit; los detalles finos (header, cards, uploader,
# sidebar) se afinan con CSS en prod/app.py (función inject_css).

[theme]
# Tema base claro.
base = "light"

# Color de acento: azul marino corporativo.
primaryColor = "#1E3A8A"

# Fondos: app blanco hueso y superficies blancas.
backgroundColor = "#F7F8FA"
secondaryBackgroundColor = "#FFFFFF"

# Texto principal: gris azulado muy oscuro (alta legibilidad sobre fondo claro).
textColor = "#1F2937"

# Tipografía sans-serif moderna (el @import de Inter va en el CSS).
font = "sans serif"

# Bordes redondeados, sobrios.
baseRadius = "0.6rem"

[server]
# Evita recolección de estadísticas de uso en desarrollo.
headless = true
